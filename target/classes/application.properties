# ============================================================
#  PRIMARY DataSource --> credentials database (for login/auth)
# ============================================================
spring.datasource.credentials.url=jdbc:mysql://localhost:3306/credentials?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.credentials.username=root
spring.datasource.credentials.password=root
spring.datasource.credentials.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  Warehouse Routing DataSource
#  Each owner's warehouse DB is resolved dynamically via X-Warehouse header.
#  The default below is used for health checks / when no header is present.
# ============================================================
warehouse.default-db=inventorybinmanagement

# ============================================================
#  JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
#  Server (single unified port)
# ============================================================
server.port=9090
